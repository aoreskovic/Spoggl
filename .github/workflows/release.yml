name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Zip plugin
        run: zip -r spoggl.zip spoggl/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: spoggl.zip
          generate_release_notes: true
